name: CI Frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Source/Client/carneup-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Source/Client/carneup-frontend/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read
  packages: write

env:
  FRONTEND_DIR: Source/Client/carneup-frontend
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/carneup-frontend

jobs:
  pipeline:
    name: Validate, analyze and package frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar padrao do codigo
        run: npm run lint

      - name: Executar testes
        run: npm run test --if-present

      - name: Validar build do frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Analise SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_FRONT }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.sources=src \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Login no GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar metadados da imagem
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build e push da imagem Docker
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
